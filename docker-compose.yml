services:
  backend:
    build: .
    container_name: malify-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./malify.db:/app/malify.db
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: postgres:16-alpine
    container_name: malify-postgres
    environment:
      POSTGRES_USER: malify
      POSTGRES_PASSWORD: malify_pass
      POSTGRES_DB: malify
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
